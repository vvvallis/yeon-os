---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: yeon-os
# description will be included in the image's metadata
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/kinoite-main
image-version: 44 # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: dnf
    repos:
      cleanup: true
      files:
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
      copr:
        - secureblue/packages
      keys:
        - https://brave-browser-rpm-release.s3.brave.com/brave-core.asc
    install:
      packages:
        - brave-browser
        - bubblejail
        # secureblue COPR
        - bubblejail
        #가상화
        - gnome-boxes
        # 보안/점검 도구
        - kdiskmark
        - clamav
        - clamav-update
        - rkhunter
        - lynis
        # 아이콘
        - papirus-icon-theme
        # pip
        - python3-pip
        # 한글 입력
        - fcitx5
        - fcitx5-hangul
        - fcitx5-configtool
        - fcitx5-qt
        - fcitx5-gtk
        # Noto 폰트 (전 언어)
        - google-noto-fonts-common
        - google-noto-sans-fonts
        - google-noto-serif-fonts
        - google-noto-mono-fonts
        - google-noto-sans-cjk-fonts
        - google-noto-serif-cjk-fonts
        - google-noto-emoji-fonts
    remove:
      packages:
        # example: removing firefox (in favor of the flatpak)
        # "firefox" is the main package, "firefox-langpacks" is a dependency
        - firefox
        - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)

  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - org.mozilla.firefox
          - ai.jan.Jan
          - com.bitwarden.desktop
          - com.github.Matoking.protontricks
          - com.github.ryonakano.reco
          - com.github.tchx84.Flatseal
          - com.github.wwmm.easyeffects
          - com.notesnook.Notesnook
          - com.rafaelmardojai.Blanket
          - com.surfshark.Surfshark
          - com.vysp3r.ProtonPlus
          - de.haeckerfelix.Shortwave
          - dev.vencord.Desktop
          - io.github.DenysMb.Kontainer
          - io.github.davidoc26.wallpaper_selector
          - io.github.flattool.Warehouse
          - io.github.giantpinkrobots.flatsweep
          - io.github.seadve.Mousai
          - io.github.tobagin.keysmith
          - io.gitlab.adhami3310.Impression
          - io.gitlab.librewolf-community
          - io.missioncenter.MissionCenter
          - it.mijorus.gearlever
          - net.gpro.gproapp
          - net.nokyan.Resources
          - org.gnome.Firmware
          - org.gnome.World.PikaBackup
          - org.gnome.World.Secrets
          - org.kde.gwenview
          - org.kde.haruna
          - org.kde.kcalc
          - org.kde.okular
          - org.nickvision.tubeconverter
          - org.qbittorrent.qBittorrent
          - org.telegram.desktop
      - scope: user # Also add Flathub user repo, but no user packages

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
